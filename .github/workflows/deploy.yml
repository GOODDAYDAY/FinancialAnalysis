name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: main
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to self-hosted server
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Only run if CI succeeds on the same commit. For push events CI
    # runs separately; for workflow_dispatch we allow manual dispatch.
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust remote host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync code to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='logs/' \
            --exclude='.env' \
            --exclude='tests/screenshots/' \
            ./ "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/"

      - name: Install / upgrade on remote
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${SERVER_USER}@${SERVER_HOST}" << 'EOF'
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            chmod +x scripts/*.sh
            ./scripts/install_linux.sh --upgrade
          EOF

      - name: Restart service
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh "${SERVER_USER}@${SERVER_HOST}" "sudo systemctl restart ai-research.service || true"
          ssh "${SERVER_USER}@${SERVER_HOST}" "sudo systemctl status ai-research.service --no-pager || true"

      - name: Smoke test
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${SERVER_USER}@${SERVER_HOST}" "cd ${DEPLOY_PATH} && ./scripts/smoke_test.sh"

      - name: Audit deploy event
        if: always()
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          STATUS: ${{ job.status }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          ssh "${SERVER_USER}@${SERVER_HOST}" "mkdir -p ${DEPLOY_PATH}/logs && echo '{\"ts\":\"'$(date -Iseconds)'\",\"kind\":\"deploy\",\"status\":\"${STATUS}\",\"sha\":\"${SHA}\",\"actor\":\"${ACTOR}\"}' >> ${DEPLOY_PATH}/logs/audit_trail.jsonl"
