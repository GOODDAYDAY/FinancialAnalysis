name: CI — MLSecOps Gate

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ── Job overview ──────────────────────────────────────────────────────────────
#
#  ml-contracts   ← FAST GATE, always runs, hard-fail
#                   tests/ml_contracts/  — state schema + Pydantic boundaries
#                                          + model pinning + prompt integrity
#                   tests/behavioral/    — advisory override + routing logic
#                   tests/security/      — AI security suite (injection, PII, filter)
#                   tests/observability/ — audit trail + token tracker
#                   tests/notification/  — email templates + sender
#
#  data-validation ← MLOps data gate, always runs
#                     tests/data_validation/ — schema + data quality
#
#  model-quality  ← LLM quality gate, always runs
#                     tests/model_quality/ — bias + hallucination + output quality
#
#  mlflow         ← Experiment tracking gate, always runs
#                     tests/test_mlflow_utils.py — MLflow integration
#
#  dependency-audit  ← supply-chain gate, always runs (independent)
#                      pip-audit (CVE scan) + secret scan
#
#  docker-build   ← Container gate, runs on push to main or PR
#                     docker build — validates Dockerfile
#
#  agent-integration ← LIVE GATE, manual only (needs DEEPSEEK_API_KEY secret)
#                      tests/agents/ + tests/e2e/
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. ML Contracts + Behavioral + Security ──────────────────────────────
  ml-contracts:
    name: ML Contracts · Behavioral · Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint (hard fail on errors, warn on style)
        run: ruff check backend/ tests/ --select=E,F,W --ignore=E501
        # E/F = real errors (undefined names, imports, syntax); E501 = line length (style)

      - name: Model config validation
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python - <<'EOF'
          from backend.config import Settings
          s = Settings()
          assert s.deepseek_model == "deepseek-chat", f"Model changed to: {s.deepseek_model}"
          assert s.llm_max_tokens > 0, "llm_max_tokens must be positive"
          assert "deepseek.com" in s.deepseek_base_url, f"Bad base URL: {s.deepseek_base_url}"
          print(f"✓ Model pinned: {s.deepseek_model}")
          print(f"✓ Max tokens: {s.llm_max_tokens}")
          print(f"✓ Base URL: {s.deepseek_base_url}")
          EOF

      - name: ML contract tests (state schema + Pydantic + config + prompts)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ml_contracts/ \
            -v \
            --tb=short \
            --junitxml=reports/ml-contracts.xml \
            --cov=backend \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing

      - name: Behavioral tests (advisory override + routing — no LLM needed)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/behavioral/ \
            -v \
            --tb=short \
            --junitxml=reports/behavioral.xml

      - name: AI security test suite (injection · PII · output filter · sanitizer)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/security/ \
            -v \
            --tb=short \
            --junitxml=reports/security.xml

      - name: Agent logic smoke (mocked LLM — zero API calls)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/benchmarks/test_bench_llm_agents.py \
            -v \
            --tb=short \
            --junitxml=reports/bench-llm-mocked.xml

      - name: Observability tests (audit trail + token tracker)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/observability/ \
            -v \
            --tb=short \
            --junitxml=reports/observability.xml

      - name: Notification tests (templates + sender)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/notification/ \
            -v \
            --tb=short \
            --junitxml=reports/notification.xml

      - name: Write test summary to GitHub step summary
        if: always()
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          def parse_junit(path):
              if not Path(path).exists():
                  return None, None, None
              tree = ET.parse(path)
              root = tree.getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")
              if suite is None:
                  return 0, 0, 0
              tests = int(suite.attrib.get("tests", 0))
              failures = int(suite.attrib.get("failures", 0)) + int(suite.attrib.get("errors", 0))
              skipped = int(suite.attrib.get("skipped", 0))
              return tests, failures, skipped

          rows = []
          suites = [
              ("ML Contracts", "reports/ml-contracts.xml"),
              ("Behavioral",   "reports/behavioral.xml"),
              ("AI Security",  "reports/security.xml"),
              ("Observability", "reports/observability.xml"),
              ("Notification", "reports/notification.xml"),
          ]
          total_tests, total_fail = 0, 0
          for label, path in suites:
              tests, fail, skip = parse_junit(path)
              if tests is None:
                  rows.append(f"| {label} | ⚠️ report missing | — | — |")
                  continue
              icon = "✅" if fail == 0 else "❌"
              rows.append(f"| {label} | {icon} | {tests} | {fail} |")
              total_tests += tests
              total_fail += fail

          summary = [
              "## CI Test Results",
              "",
              f"**Total:** {total_tests} tests · {total_fail} failures",
              "",
              "| Suite | Status | Tests | Failures |",
              "|:------|:------:|------:|---------:|",
          ] + rows

          with open("$GITHUB_STEP_SUMMARY", "a") as f:
              f.write("\n".join(summary) + "\n")
          print("\n".join(summary))
          EOF
        env:
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            reports/ml-contracts.xml
            reports/behavioral.xml
            reports/security.xml
            reports/observability.xml
            reports/notification.xml
            reports/coverage.xml
          retention-days: 30

  # ── 2. Data Validation (MLOps data gate) ──────────────────────────────────
  data-validation:
    name: Data Validation · Schema · Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ml-contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Schema validation tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/data_validation/test_schema.py \
            -v \
            --tb=short \
            --junitxml=reports/data-schema.xml

      - name: Data quality tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/data_validation/test_data_quality.py \
            -v \
            --tb=short \
            --junitxml=reports/data-quality.xml

      - name: Upload data validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-validation-reports-${{ github.run_number }}
          path: |
            reports/data-schema.xml
            reports/data-quality.xml
          retention-days: 30

  # ── 3. Model Quality (LLM bias + hallucination + output quality) ─────────
  model-quality:
    name: Model Quality · Bias · Hallucination
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: data-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Bias detection tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/model_quality/test_bias.py \
            -v \
            --tb=short \
            --junitxml=reports/model-bias.xml

      - name: Hallucination detection tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/model_quality/test_hallucination.py \
            -v \
            --tb=short \
            --junitxml=reports/model-hallucination.xml

      - name: Output quality tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/model_quality/test_output_quality.py \
            -v \
            --tb=short \
            --junitxml=reports/model-output-quality.xml

      - name: Upload model quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-quality-reports-${{ github.run_number }}
          path: |
            reports/model-bias.xml
            reports/model-hallucination.xml
            reports/model-output-quality.xml
          retention-days: 30

  # ── 4. MLflow Experiment Tracking ────────────────────────────────────────
  mlflow:
    name: MLflow Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: data-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: MLflow integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/test_mlflow_utils.py \
            -v \
            --tb=short \
            --junitxml=reports/mlflow.xml

      - name: Upload MLflow reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-reports-${{ github.run_number }}
          path: reports/mlflow.xml
          retention-days: 30

  # ── 5. Docker Build & Security Scan ──────────────────────────────────────
  docker-build:
    name: Docker Build · Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ml-contracts, data-validation, dependency-audit, model-quality, mlflow, grid-excel-validation]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --tag investment-research:${{ github.sha }} \
            --tag investment-research:latest \
            .

      - name: Verify image runs
        run: |
          # Quick smoke test: container starts and CMD is valid
          docker run --rm investment-research:latest \
            python -c "import backend; print('Backend import OK')"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: investment-research:latest
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

  # ── 6. Agent Functional Benchmarks (real API + real data) ────────────────
  agent-benchmarks:
    name: Agent Functional Benchmarks — Real API
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: docker-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Benchmark — Data agents (real yfinance/akshare, no API key)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/benchmarks/test_bench_data_agents.py \
            -v \
            --tb=short \
            --junitxml=reports/bench-data.xml

      - name: Benchmark — LLM agents (real DeepSeek calls)
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          pytest tests/agents/ \
            -v \
            --tb=short \
            --junitxml=reports/bench-llm-real.xml
        # All 16 agent suites, real DeepSeek + yfinance + akshare

      - name: Write per-agent benchmark summary
        if: always()
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          from collections import defaultdict

          def parse_cases(path):
              if not Path(path).exists():
                  return []
              root = ET.parse(path).getroot()
              cases = root.findall(".//testcase")
              results = []
              for c in cases:
                  name = c.attrib.get("classname", "") + "::" + c.attrib.get("name", "")
                  failed = c.find("failure") is not None or c.find("error") is not None
                  results.append((name, failed))
              return results

          # Group by agent (second segment of classname like "tests.agents.advisory.test_advisory")
          agent_stats = defaultdict(lambda: [0, 0])  # [pass, fail]
          for name, failed in parse_cases("reports/bench-llm-real.xml"):
              parts = name.split(".")
              agent = parts[2] if len(parts) > 2 else "unknown"
              if failed:
                  agent_stats[agent][1] += 1
              else:
                  agent_stats[agent][0] += 1

          lines = [
              "## Agent Benchmark Results (Real API)",
              "",
              "| Agent | Status | Passed | Failed |",
              "|:------|:------:|-------:|-------:|",
          ]
          for agent in sorted(agent_stats):
              p, f = agent_stats[agent]
              icon = "✅" if f == 0 else "❌"
              lines.append(f"| {agent} | {icon} | {p} | {f} |")

          # Data agents summary
          data_cases = parse_cases("reports/bench-data.xml")
          data_pass = sum(1 for _, f in data_cases if not f)
          data_fail = sum(1 for _, f in data_cases if f)
          data_icon = "✅" if data_fail == 0 else "❌"
          lines.append(f"| *data agents* | {data_icon} | {data_pass} | {data_fail} |")

          total_pass = sum(p for p, _ in agent_stats.values()) + data_pass
          total_fail = sum(f for _, f in agent_stats.values()) + data_fail
          lines.insert(2, f"**Total: {total_pass} passed · {total_fail} failed**")
          lines.insert(3, "")

          with open("$GITHUB_STEP_SUMMARY", "a") as fh:
              fh.write("\n".join(lines) + "\n")
          print("\n".join(lines))
          EOF
        env:
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports-${{ github.run_number }}
          path: |
            reports/bench-data.xml
            reports/bench-llm-real.xml
          retention-days: 30

  # ── 3. Supply-chain audit ─────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit · Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: ml-contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install for audit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: CVE scan (pip-audit)
        run: |
          pip-audit --format=json --output=reports/pip-audit.json || true
          pip-audit --strict \
            --ignore-vuln GHSA-4xh5-x5gv-qwph \
            || echo "::warning::Non-critical CVEs found — review reports/pip-audit.json"

      - name: Static secret scan
        run: |
          # Hard fail on hard-coded API keys in tracked source files.
          # tests/ excluded: contains synthetic keys as security test fixtures.
          if grep -rE "sk-[a-zA-Z0-9]{20,}" \
              --include="*.py" --include="*.md" --include="*.yml" --include="*.json" \
              --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir="tests" .; then
            echo "::error::Hard-coded API key detected in tracked file"
            exit 1
          fi
          echo "✓ No hard-coded secrets found."

      - name: "Model supply-chain: verify pinned model ID unchanged"
        run: |
          python - <<'EOF'
          import subprocess, sys
          result = subprocess.run(
              ["git", "log", "--oneline", "-5", "--", "backend/config.py"],
              capture_output=True, text=True
          )
          print("Recent changes to backend/config.py:")
          print(result.stdout or "(no recent changes)")
          EOF

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_number }}
          path: reports/pip-audit.json
          retention-days: 30

  # ── 6b. REQ-002 Excel Validation ─────────────────────────────────────────
  grid-excel-validation:
    name: Excel Validation (REQ-002)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: model-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate grid trading calculator Excel
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/test_excel_validation.py \
            -v \
            --tb=short \
            --junitxml=reports/excel-validation.xml

      - name: Upload Excel validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: excel-validation-report-${{ github.run_number }}
          path: reports/excel-validation.xml
          retention-days: 30

  # ── 7. Live agent integration tests (manual only — needs API key) ─────────
  agent-integration:
    name: Agent Integration Tests (live APIs)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Only run on manual dispatch — agent tests make real DeepSeek + yfinance calls
    if: github.event_name == 'workflow_dispatch'
    needs: agent-benchmarks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run agent tests (real API calls)
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          pytest tests/agents/ \
            -v \
            --tb=short \
            --junitxml=reports/agents.xml \
            -x \
            --timeout=60
        # -x: stop on first failure to save API cost

      - name: Run E2E pipeline test
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          pytest tests/e2e/ \
            -v \
            --tb=short \
            --junitxml=reports/e2e.xml \
            --timeout=120

      - name: Upload integration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-reports-${{ github.run_number }}
          path: |
            reports/agents.xml
            reports/e2e.xml
          retention-days: 14

  # ── 8. Deploy: Build & push Docker image ──────────────────────────────────
  deploy-build-and-push:
    name: Deploy — Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ml-contracts, data-validation, dependency-audit, model-quality, mlflow, grid-excel-validation, docker-build, agent-benchmarks]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gooddayday/financialanalysis/app
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 9. Deploy: SSH to production server ───────────────────────────────────
  deploy-production:
    name: Deploy — Push to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy-build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o IdentitiesOnly=yes \
              -p "${SSH_PORT:-22}" \
              "${SSH_USER}@${SSH_HOST}" \
              "set -e; \
               cd /home/ubuntu/ai-project && \
               echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
               docker compose pull app && \
               docker compose up -d app && \
               echo '[deploy] container restarted'"

      - name: Health check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o IdentitiesOnly=yes \
              -p "${SSH_PORT:-22}" \
              "${SSH_USER}@${SSH_HOST}" \
              "set -e; \
               for i in \$(seq 1 15); do \
                 if curl -sf -m 3 http://127.0.0.1:8501/_stcore/health >/dev/null; then \
                   echo \"[deploy] web healthy after \$((i*2))s\"; \
                   exit 0; \
                 fi; \
                 sleep 2; \
               done; \
               echo '[deploy] web health check failed after 30s'; \
               docker compose -f /home/ubuntu/ai-project/docker-compose.yml logs --tail=50 app; \
               exit 1"
