services:
  # ── Streamlit application ─────────────────────────────────────────────────
  app:
    image: ${APP_IMAGE:-ghcr.io/${GITHUB_REPOSITORY:-owner/multi-agent-investment-research}/app:latest}
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=investment-research
    depends_on:
      - mlflow
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MLflow tracking server ────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'
      --cors-allowed-origins '*'
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlartifacts
    volumes:
      - mlflow-data:/mlflow
      - mlflow-artifacts:/mlartifacts
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  mlflow-data:
  mlflow-artifacts:
